    <nav class="menu">
      <a href="index.html">Головна</a>

    <a href="index.html">Головна</a>
    <a href="staff.html">Склад</a>

<section class="gallery-page">
  <div class="container">
    <h1 class="section-title">Фотогалерея</h1>
    <p class="gallery-subtitle">Оберіть рік — і переглядайте фото подій та змагань.</p>

    <!-- Перемикач років -->
    <div class="year-tabs">
      <button class="year-tab active" data-year="y2026">2026</button>
      <button class="year-tab" data-year="y2025">2025</button>
      <button class="year-tab" data-year="y2024">2024</button>
    </div>

    <!-- 2026 -->
    <div class="year-block active" id="y2026">
      <div class="masonry">
        <!-- ЗАМІНЮЙ src НА СВОЇ ФОТО, КОПІЮЙ БЛОКИ -->
        <img src="images/gallery/2026/1.jpg" alt="Фото 2026" onclick="openLightbox(this.src)">
        <img src="images/gallery/2026/2.jpg" alt="Фото 2026" onclick="openLightbox(this.src)">
        <img src="images/gallery/2026/3.jpg" alt="Фото 2026" onclick="openLightbox(this.src)">
        <img src="images/gallery/2026/4.jpg" alt="Фото 2026" onclick="openLightbox(this.src)">
        <img src="images/gallery/2026/5.jpg" alt="Фото 2026" onclick="openLightbox(this.src)">
      </div>
    </div>

    <!-- 2025 -->
    <div class="year-block" id="y2025">
      <div class="masonry">
        <img src="images/gallery/2025/1.jpg" alt="Фото 2025" onclick="openLightbox(this.src)">
        <img src="images/gallery/2025/2.jpg" alt="Фото 2025" onclick="openLightbox(this.src)">
        <img src="images/gallery/2025/3.jpg" alt="Фото 2025" onclick="openLightbox(this.src)">
        <img src="images/gallery/2025/4.jpg" alt="Фото 2025" onclick="openLightbox(this.src)">
      </div>
    </div>

    <!-- 2024 -->
    <div class="year-block" id="y2024">
      <div class="masonry">
        <img src="images/gallery/2024/1.jpg" alt="Фото 2024" onclick="openLightbox(this.src)">
        <img src="images/gallery/2024/2.jpg" alt="Фото 2024" onclick="openLightbox(this.src)">
        <img src="images/gallery/2024/3.jpg" alt="Фото 2024" onclick="openLightbox(this.src)">
      </div>
    </div>

  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <img id="lightboxImg" src="" alt="Перегляд фото">
  </div>
</div>

<footer>© ДЮСШ Близнюки</footer>

<script>
function toggleMenu(){ document.getElementById("mobile").classList.toggle("show"); }

// Tabs
document.querySelectorAll('.year-tab').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.year-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    const year = btn.getAttribute('data-year');
    document.querySelectorAll('.year-block').forEach(block=>block.classList.remove('active'));
    document.getElementById(year).classList.add('active');

    window.scrollTo({top: 0, behavior:'smooth'});
  });
});

// Lightbox
function openLightbox(src){
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightboxImg').src = '';
}
</script>

</body>
</html>
